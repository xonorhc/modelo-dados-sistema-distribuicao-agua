services:
  db:
    image: postgis/postgis:15-3.3
    container_name: postgis_sistema_agua
    restart: always

    shm_size: 256mb

    ports:
      - "${DB_PORT:-5432}:5432"

    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
      - POSTGRES_DB=${DB_NAME:-postgis}
      - POSTGRES_HOST_AUTH_METHOD=${DB_AUTH_METHOD:-md5}

    volumes:
      - ./pgdata_sistema_agua:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d

    logging:
      driver: "json-file"
      options:
        max-size: "10mb"

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
